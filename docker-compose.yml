volumes:
  database:

services:
  database:
    image: postgres:14.20
    environment:
      POSTGRES_USER: permacoop
      POSTGRES_PASSWORD: permacoop
      POSTGRES_DB: permacoop
      PGUSER: permacoop
      PGPASSWORD: permacoop
    volumes:
      - 'database:/var/lib/postgresql/data'
    ports:
      - 5433:5432
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U permacoop"]
      interval: 5s
      timeout: 5s
      retries: 5
